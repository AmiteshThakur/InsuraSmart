<div class="login-container">
  <div class="login-box">
    <h2>Welcome Back</h2>
    
    <form (ngSubmit)="onLogin()">
      <!-- User ID -->
      <div class="input-group">
        <label for="userId">User ID</label>
        <input type="text" id="userId" [(ngModel)]="userId" name="userId" placeholder="Enter your ID" required>
      </div>

      <!-- Password -->
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" [(ngModel)]="password" name="password" placeholder="Enter your password" required>
      </div>

      <!-- Role Selection -->
      <div class="input-group">
        <label for="role">Select Role</label>
        <select id="role" [(ngModel)]="role" name="role" required>
          <option value="" disabled selected>Choose your role</option>
          <option value="underwriter">Underwriter</option>
          <option value="admin">Admin</option>
        </select>
      </div>

      <!-- Login Button -->
      <button type="submit" class="login-btn">Login</button>
    </form>
  </div>
</div>
